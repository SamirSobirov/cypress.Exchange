name: AutoTest Currency Valyut

on:
  schedule:
    - cron: '0 */2 * * *' 
  workflow_dispatch:
    inputs:
      user_chat_id:
        description: 'ID чата для личного ответа'
        required: false
        default: ''

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Добавлен id для отслеживания результата этого конкретного шага
      - name: Cypress run
        id: cypress_step
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/monitoring/exange.cy.js 
          browser: chrome
        env:
          CYPRESS_LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          CYPRESS_LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

      - name: Parse Diagnostic Data
        if: always()
        run: |
          # 1. Ищем файл в корне
          if [ -f provider_rates_status.txt ]; then
            RESULT=$(cat provider_rates_status.txt | tr -d '[:space:]')
          # 2. Ищем файл в стандартной папке fixtures, если Cypress сохранил его туда
          elif [ -f cypress/fixtures/provider_rates_status.txt ]; then
            RESULT=$(cat cypress/fixtures/provider_rates_status.txt | tr -d '[:space:]')
          # 3. УМНЫЙ ФОЛЛБЭК: Если файла нет, но Cypress прошел успешно — ставим статус 3 (Success)
          elif [ "${{ steps.cypress_step.outcome }}" == "success" ]; then
            RESULT="3"
          # 4. Если Cypress упал и файла нет
          else
            RESULT="UNKNOWN"
          fi

          S1="⏳"; S2="⏳"; S3="⏳"; STATUS="🔴 Failed"

          case "$RESULT" in
            "0") S1="❌"; STATUS="❌ Failed at Add" ;;
            "1") S1="✅"; S2="❌"; STATUS="⚠️ Failed at Edit" ;;
            "2") S1="✅"; S2="✅"; S3="❌"; STATUS="⚠️ Failed at Delete" ;;
            "3") S1="✅"; S2="✅"; S3="✅"; STATUS="🟢 Success" ;;
            ERROR_*) S1="🆘 ${RESULT}"; STATUS="🔴 API Error" ;;
            *) STATUS="❌ Cypress Test Failed / No Data" ;;
          esac

          echo "S1=$S1" >> $GITHUB_ENV
          echo "S2=$S2" >> $GITHUB_ENV
          echo "S3=$S3" >> $GITHUB_ENV
          echo "FINAL_STATUS=$STATUS" >> $GITHUB_ENV

      - name: Upload Cypress Screenshots & Videos
        uses: actions/upload-artifact@v4
        if: failure() || always()
        with:
          name: cypress-artifacts-exange
          path: |
            cypress/screenshots/
            cypress/videos/
          if-no-files-found: ignore

      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: >-
            ${{ (github.event.inputs.user_chat_id != '') && 
            github.event.inputs.user_chat_id || 
            secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }} 
          format: markdown
          message: |
            ${{ github.event_name == 'schedule' && '📢 **Hourly Monitoring**' || '👤 **Manual Testing**' }}
            
            📂 **Module:** Currency Valyut (Exange)
            📊 **Status:** ${{ env.FINAL_STATUS }}

            **Flow Steps:**
            1. Add: ${{ env.S1 }}
            2. Edit: ${{ env.S2 }}
            3. Delete: ${{ env.S3 }}