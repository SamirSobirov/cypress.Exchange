name: AutoTest Currency Valyut

on:
  schedule:
    - cron: '0 */2 * * *' # Запуск каждые 2 часа
  workflow_dispatch:
    inputs:
      user_chat_id:
        description: 'ID чата для личного ответа'
        required: false
        default: ''

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          # ВНИМАНИЕ: Проверь путь к файлу теста. Судя по скриншотам, он называется exange.cy.js
          spec: cypress/e2e/monitoring/exange.cy.js 
          browser: chrome
        env:
          # Передаем креды, так как тест включает Блок 1 (Авторизация)
          CYPRESS_LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          CYPRESS_LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

      - name: Parse Diagnostic Data
        if: always()
        run: |
          # Читаем HTTP статус из файла, который создал наш Cypress-тест (из Блока 5)
          if [ -f provider_rates_status.txt ]; then
            API_STATUS=$(cat provider_rates_status.txt | tr -d '[:space:]')
          else
            API_STATUS="UNKNOWN"
          fi

          # Формируем статус для Telegram в зависимости от кода ответа сервера
          if [[ "$API_STATUS" == "UNKNOWN" ]]; then
            echo "MSG_STATUS=❌ UI Error / Crash" >> $GITHUB_ENV
          elif [[ "$API_STATUS" -ge 400 ]]; then
            echo "MSG_STATUS=🆘 API Error (HTTP $API_STATUS)" >> $GITHUB_ENV
          elif [[ "$API_STATUS" -ge 200 && "$API_STATUS" -lt 400 ]]; then
            echo "MSG_STATUS=✅ API Success" >> $GITHUB_ENV
          else
            echo "MSG_STATUS=❌ Unknown Failure" >> $GITHUB_ENV
          fi

      - name: Upload Cypress Screenshots
        uses: actions/upload-artifact@v4
        if: failure() || always()
        with:
          name: cypress-screenshots-rates
          path: cypress/screenshots/
          if-no-files-found: ignore

      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: >-
            ${{ (github.event.inputs.user_chat_id != '') && 
            github.event.inputs.user_chat_id || 
            secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }} 
          format: markdown
          message: |
            ${{ github.event_name == 'schedule' && '📢 **Automated Monitoring**' || '👤 **Manual Testing**' }}
            
            💱 **Provider Currency Rates Result**
            **Stages:** Add ➡️ Edit ➡️ Delete
            **Job Status:** ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}
            **Backend/UI:** ${{ env.MSG_STATUS }}
            **Time:** ${{ github.event_name == 'schedule' && 'Scheduled ⏰' || 'Manual 🔘' }}